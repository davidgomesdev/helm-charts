suite: serviceaccount
templates:
  - serviceaccount.yaml

tests:
  - it: renders with default values
    asserts:
      - isKind:
          of: ServiceAccount
      - matchSnapshot:
          path: metadata

  - it: no document when create is false
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0
